services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - BASE_URL=${BASE_URL:-http://localhost:3000}
      - UPLOAD_DIR=./uploads
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-524288000}
      - RETENTION_HOURS=${RETENTION_HOURS:-48}
    volumes:
      # Persist uploads across container restarts
      - uploads_data:/app/uploads
      # Mount certs for HTTPS (optional)
      - ./certs:/app/certs:ro
    restart: unless-stopped

volumes:
  uploads_data:
